services:
  backend:
    build: ./chatapp
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://your-cloud-db-url:5432/dbname
      - SPRING_DATASOURCE_USERNAME=your_user
      - SPRING_DATASOURCE_PASSWORD=your_password

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend